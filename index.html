xt&quot;:&quot;Creators!&quot;,&quot;feat_show_love_subtitle_give_your_text&quot;:&quot;Give your&quot;,&quot;feat_show_love_subtitle_fans_variant&quot;:&quot;fans&quot;,&quot;feat_show_love_subtitle_followers_variant&quot;:&quot;followers&quot;,&quot;feat_show_love_subtitle_supporters_variant&quot;:&quot;supporters&quot;,&quot;feat_show_love_subtitle_audiences_variant&quot;:&quot;audiences&quot;,&quot;feat_show_love_subtitle_easy_way_text&quot;:&quot;an easy way to&quot;,&quot;feat_show_love_subtitle_show_love_text&quot;:&quot;show love!&quot;,&quot;feat_show_love_description&quot;:&quot;Show Love enables you to easily accept tips and donations from your supporters and fans from all over the world.&quot;,&quot;feat_show_love_hero_action_button_text&quot;:&quot;Get Started&quot;,&quot;feat_show_love_difference_section_difference_heading&quot;:&quot;Why we are different&quot;,&quot;feat_show_love_difference_section_difference_description&quot;:&quot;Our platform is designed to let your creativity shine while making appreciation simple and heartfelt.&quot;,&quot;feat_show_love_difference_section_multi_currency_support_heading&quot;:&quot;Multi-Currency Support&quot;,&quot;feat_show_love_difference_section_multi_currency_support_description&quot;:&quot;No matter where your fans are, we&#039;ve got you covered. Receive payments in over 10 currencies! Stripe and PayPal payments supported for verified creators.&quot;,&quot;feat_show_love_difference_section_quick_setup_heading&quot;:&quot;Quick Setup in Less Than 5 Minutes&quot;,&quot;feat_show_love_difference_section_quick_setup_description&quot;:&quot;Time is precious, and we value yours. Setting up a Show Love page takes less than 5 minutes, so you can focus on what you do best \u2013 creating&quot;,&quot;feat_show_love_difference_section_realtime_heading&quot;:&quot;Real-time Fan Connection&quot;,&quot;feat_show_love_difference_section_realtime_description&quot;:&quot;Receive instant notifications and messages from fans as they send their love. It&#039;s like a virtual standing ovation after every performance!&quot;,&quot;feat_show_love_difference_section_personalize_heading&quot;:&quot;Personalise your appreciation&quot;,&quot;feat_show_love_difference_section_personalize_description&quot;:&quot;Customize your thank-you messages and choose how you want to ask fans to show you love. Your creativity, your rules!&quot;,&quot;feat_show_love_hiw_heading&quot;:&quot;How it Works&quot;,&quot;feat_show_love_hiw_description&quot;:&quot;It takes less than five minutes to set up. It&#039;s as easy as pie!&quot;,&quot;feat_show_love_hiw_step_1&quot;:&quot;Click on \&quot;Get Started\&quot; and provide the necessary credentials to set up your Show Love account.&quot;,&quot;feat_show_love_hiw_step_2&quot;:&quot;After successfully creating an account, you will receive a personalised URL link to your Show Love page, which you can share with your supporters.&quot;,&quot;feat_show_love_hiw_step_3&quot;:&quot;Sit back and relax while your supporters show you love, because you deserve it 100 percent.&quot;,&quot;feat_show_love_for_creators_heading&quot;:&quot;For Creators by Creators&quot;,&quot;feat_show_love_for_creators_benefit_monetize_heading&quot;:&quot;Monetize Your Fandom &lt;br\/&gt; Like a Rockstar&quot;,&quot;feat_show_love_for_creators_benefit_monetize_description&quot;:&quot;Your fans are itching to support you beyond the virtual cheers. Let &#039;em show love the real way \u2013 cold, hard cash to back your art&quot;,&quot;feat_show_love_for_creators_benefit_cash_direct_heading&quot;:&quot;Cash Direct &lt;br\/&gt; to Your Pocket&quot;,&quot;feat_show_love_for_creators_benefit_cash_direct_description&quot;:&quot;No middleman mess! Show Love lets your fans slide cash right into your DMs \u2013 the virtual kind, of course.&quot;,&quot;feat_show_love_for_creators_benefit_level_up_heading&quot;:&quot;Level Up Your &lt;br\/&gt; Creative Choice&quot;,&quot;feat_show_love_for_creators_benefit_level_up_description&quot;:&quot;Forget about waiting for the big break. With Show Love, your fans become the VIPs of your creative journey. Need studio time? Show Love&#039;s got you covered!&quot;,&quot;feat_show_love_for_creators_action_button_text&quot;:&quot;Get Started&quot;,&quot;feat_show_love_payouts_heading&quot;:&quot;Payouts&quot;,&quot;feat_show_love_payouts_description_part_1&quot;:&quot;Selar supports 12 currencies today and because we work with multiple providers to make this possible, payouts to your bank account\/wallet are made based on the currency of the sale.&quot;,&quot;feat_show_love_payouts_description_part_5&quot;:&quot;Payouts for show love payment follow the&quot;,&quot;feat_show_love_payouts_description_part_2&quot;:&quot;the default payout schedule&quot;,&quot;feat_show_love_payouts_description_part_3&quot;:&quot;except 5 extra days are added&quot;,&quot;feat_show_love_payouts_description_part_4&quot;:&quot;Why? To support transactions like this, our payment provider requires some extra days for AML validation.&quot;,&quot;feat_show_love_faqs_heading&quot;:&quot;Frequently Asked Questions&quot;,&quot;feat_show_love_faqs_question_what_is_show_love&quot;:&quot;What is Selar Show Love?&quot;,&quot;feat_show_love_faqs_answer_what_is_show_love&quot;:&quot;Selar Show Love is a tipping feature that allows fans to send cash gifts to their favorite creators, stars, celebrities, and friends. It&#039;s a way to show appreciation and support directly through the Selar platform.&quot;,&quot;feat_show_love_faqs_question_send_tip&quot;:&quot;How do I send a tip?&quot;,&quot;feat_show_love_faqs_answer_send_tip&quot;:&quot;Sending a tip is easy! Just visit the Show Love page of your favorite creator, choose the amount you want to tip, and hit the \&quot;Send Love\&quot; button. Your gesture will be instantly delivered to the recipient.&quot;,&quot;feat_show_love_faqs_question_send_tips_to_anyone&quot;:&quot;Can I send tips to anyone on Selar?&quot;,&quot;feat_show_love_faqs_answer_send_tips_to_anyone&quot;:&quot;Creators, stars, and celebrities need to activate the Show Love feature on their profiles to receive tips. Once they&#039;re set up, you can show love to your favorite personalities and content creators.&quot;,&quot;feat_show_love_faqs_question_fees_for_sending_tips&quot;:&quot;Are there any fees for sending tips?&quot;,&quot;feat_show_love_faqs_answer_fees_for_sending_tips&quot;:&quot;Yes, Selar charges a small processing fee for each Show Love transaction. The details of the fees will be transparently displayed before you confirm the tip.&quot;,&quot;feat_show_love_faqs_question_tips_frequency&quot;:&quot;How often can I send tips?&quot;,&quot;feat_show_love_faqs_answer_tips_frequency&quot;:&quot;You can send tips whenever you feel the love! Whether it&#039;s a one-time appreciation or a regular show of support, the power is in your hands.&quot;,&quot;feat_show_love_faqs_question_financial_info_security&quot;:&quot;Is my financial information secure?&quot;,&quot;feat_show_love_faqs_answer_financial_info_security&quot;:&quot;Absolutely. Selar uses a secure payment gateway for all transactions. Your financial information is encrypted and protected to ensure a safe and secure tipping experience.&quot;,&quot;feat_show_love_faqs_question_receive_tips&quot;:&quot;How do creators receive their tips?&quot;,&quot;feat_show_love_faqs_answer_receive_tips&quot;:&quot;Creators receive their tips through a secure payout process. The settlement for all payouts occurs after a 5-day waiting period to ensure smooth and accurate transactions.&quot;,&quot;feat_show_love_faqs_question_get_verified&quot;:&quot;How can creators get verified and receive a badge?&quot;,&quot;feat_show_love_faqs_answer_get_verified&quot;:&quot;Creators can go through our verification process, including KYC checks, to receive a verified badge. This badge adds an extra layer of trust for fans, showing that the creator is authentic and has complete ot;,&quot;feat_all_tools_affiliates_action_button_text&quot;:&quot;Learn more&quot;,&quot;feat_all_tools_follow_ups_heading&quot;:&quot;Automated Follow-ups&quot;,&quot;feat_all_tools_follow_ups_description&quot;:&quot;Never miss a prospective buyer with Selar&#039;s automated follow ups. Proven to drive conversions by at least 30%.&quot;,&quot;feat_all_tools_upsells_heading&quot;:&quot;Upsells (order bump) &amp; Cross-sells&quot;,&quot;feat_all_tools_upsells_description&quot;:&quot;Extract more value from your customers with product upsell (order bump) and cross-sells. Recommend products on checkout and show customers frequently bought products.&quot;,&quot;feat_all_tools_sales_pages_heading&quot;:&quot;Sales Pages&quot;,&quot;feat_all_tools_sales_pages_description&quot;:&quot;Create custom sales\/landing pages for your products. Descriptive sales pages drive more conversions.&quot;,&quot;feat_all_tools_sales_pages_action_button_text&quot;:&quot;Learn more&quot;,&quot;feat_all_tools_payments_heading&quot;:&quot;Multicurrency &amp; International Payments&quot;,&quot;feat_all_tools_payments_description&quot;:&quot;Selar supports 12 currencies and multiple payment methods including PayPal, Stripe, and local currency payment methods from all countries allowing payments from anyone, anywhere in the world.&quot;,&quot;feat_all_tools_custom_checkout_heading&quot;:&quot;Custom Checkout Form&quot;,&quot;feat_all_tools_custom_checkout_description&quot;:&quot;Collect extra info from your customers before checkout with a fully customizable checkout form.&quot;,&quot;feat_all_tools_payments_action_button_text&quot;:&quot;Learn more&quot;,&quot;feat_all_tools_integrations_heading&quot;:&quot;Seamlessly integrate Selar with your favourite tools&quot;,&quot;feat_all_tools_integrations_description&quot;:&quot;Double your conversion by integrating your favorite tools on Selar.&quot;,&quot;feat_all_tools_more_integrations_text&quot;:&quot;and more!&quot;,&quot;feat_all_tools_integrat ickets_trusted_solution&quot;:&quot;Your Trusted Ticketing Solution&quot;,&quot;tickets_by_selar&quot;:&quot;Tickets By Selar&quot;,&quot;tickets_seamless_sales&quot;:&quot;Seamlessly sell access to your online, offline, and hybrid events with ease\u2014now with a dedicated mobile app for fast and secure guest check-ins, even offline.&quot;,&quot;tickets_check_in_success&quot;:&quot;Check In Successful&quot;,&quot;tickets_undo_check_in&quot;:&quot;Undo Check In&quot;,&quot;tickets_your_events&quot;:&quot;Your Events&quot;,&quot;tickets_upcoming_events&quot;:&quot;Upcoming Events&quot;,&quot;tickets_past_events&quot;:&quot;Past Events&quot;,&quot;tickets_effortless_hosting&quot;:&quot;Effortlessly Host &amp; Manage Any Event or Masterclass&quot;,&quot;tickets_online_events&quot;:&quot;Online Events&quot;,&quot;tickets_physical_events&quot;:&quot;Physical Events&quot;,&quot;tickets_hybrid_events&quot;:&quot;Hybrid Events&quot;,&quot;tickets_events_masterclasses&quot;:&quot;Masterclass&quot;,&quot;tickets_events_webinars&quot;:&quot;Webinars&quot;,&quot;tickets_events_concerts&quot;:&quot;Concerts&quot;,&quot;tickets_events_hybrid&quot;:&quot;Hybrid&quot;,&quot;tickets_events_virtual_conferences&quot;:&quot;Virtual Conferences&quot;,&quot;tickets_events_festivals&quot;:&quot;Festivals&quot;,&quot;tickets_events_trade_shows&quot;:&quot;Trade shows&quot;,&quot;tickets_platform_all_in_one&quot;:&quot;Your All-in-One Event &amp; Masterclass Platform&quot;,&quot;tickets_platform_uses&quot;:&quot;Sell tickets, host events, and run masterclasses effortlessly with Tickets by Selar. Whether online, offline, or hybrid, our platform ensures a seamless experience\u2014from ticket purchase to secure guest check-in via our mobile app.&quot;,&quot;tickets_planning_heading&quot;:&quot;Planning an event?&quot;,&quot;tickets_planning_description&quot;:&quot;Handle everything from ticket creation to check-ins in one place. With Tickets by Selar, it\u2019s easy to set up your event, accept payments, and track attendees. &quot;,&quot;tickets_planning_simple_heading&quot;:&quot;Simple Event Setup&quot;,&quot;tickets_planning_simple_description&quot;:&quot;Create and publish your event in minutes.&quot;,&quot;tickets_planning_auto_heading&quot;:&quot;Automated ticketing &amp; check-in&quot;,&quot;tickets_planning_auto_description&quot;:&quot;Guests get instant access with QR codes.&quot;,&quot;tickets_planning_entry_heading&quot;:&quot;Seamless entry process&quot;,&quot;tickets_planning_entry_descrription&quot;:&quot;Scan tickets quickly, even offline.&quot;,&quot;tickets_planning_multicurrency_heading&quot;:&quot;Multi-currency payments&quot;,&quot;tickets_planning_multicurrency_description&quot;:&quot;Sell tickets globally with automated currency conversion.&quot;,&quot;tickets_planning_realtime_track_heading&quot;:&quot;Real-time tracking&quot;,&quot;tickets_planning_monitor_sales_description&quot;:&quot;Monitor sales, revenue, and attendance with ease.&quot;,&quot;tickets_everything_heading&quot;:&quot;Everything You Need - All in One Place&quot;,&quot;tickets_everything_feat_insights_head&quot;:&quot;Real-Time Insights &amp; Global Payments&quot;,&quot;tickets_everything_feat_insights_description&quot;:&quot;Monitor ticket sales, revenue, and check-ins in real-time while accepting payments in multiple currencies globally.&quot;,&quot;tickets_everything_feat_insight_word&quot;:&quot;Insight&quot;,&quot;tickets_everything_feat_insight_sale_report&quot;:&quot;Sale Report&quot;,&quot;tickets_everything_feat_flexible_heading&quot;:&quot;Flexible Ticketing &amp; Sales Control&quot;,&quot;tickets_everything_feat_flexible_description&quot;:&quot;Create flexible ticket tiers with unique pricing while managing sales limits, closing sales anytime, and monitoring performance in real time.&quot;,&quot;tickets_everything_feat_calendar_integration&quot;:&quot;Calendar Integration&quot;,&quot;tickets_everything_feat_calendar_description&quot;:&quot;Ensure your attendees never miss an event. Automatically share venue details for offline events and meeting links for online sessions, with seamless calendar integration that keeps everyone in sync.&quot;,&quot;tickets_everything_feat_wallet_heading&quot;:&quot;Apple &amp; Google Wallet Integration&quot;,&quot;tickets_everything_feat_wallet_description&quot;:&quot;Make life easy for your attendees! Let them skip the hassle of searching through emails to find their tickets. With this option, they can add their ticket to their Apple or Google wallet and simply use that to for a quick and seamless check-in at the venue.&quot;,&quot;tickets_everything_feat_groups_heading&quot;:&quot;Effortless Group Bookings &amp; Masterclass Hosting&quot;,&quot;tickets_everything_feat_groups_description&quot;:&quot;Allow group bookings by automatically sending tickets to multiple recipients, while hosting paid or free masterclasses purchases on one platform.&quot;,&quot;tickets_everything_feat_custom_checkout&quot;:&quot;Custom Checkout Forms&quot;,&quot;tickets_everything_feat_custom_checkout_description&quot;:&quot;Collect extra info from your customers before checkout with a fully customisable form.&quot;,&quot;tickets_everything_feat_instant_access_heading&quot;:&quot;Instant Access &amp; Seamless Check-Ins&quot;,&quot;tickets_everything_feat_instant_access_description&quot;:&quot;Guests receive immediate access to their events and masterclasses upon purchase, with a unique QR code for easy scanning and validation via the Tickets by Selar App.&quot;,&quot;tickets_everything_feat_check_in&quot;:&quot;Guests receive immediate access to their events and masterclasses upon purchase, with a unique QR code for easy scanning and validation via the Tickets by Selar App.&quot;,&quot;tickets_physical_events_heading&quot;:&quot;Selling Tickets for Physical Events?&quot;,&quot;tickets_physical_events_description&quot;:&quot;Use the\u00a0Tickets by Selar\u00a0mobile app to check in guests with ease. \nScan tickets, validate entries, and manage your guest list\u2014online or offline.&quot;,&quot;tickets_physical_events_feat_easy_signin_heading&quot;:&quot;EASY SIGN-IN&quot;,&quot;tickets_physical_events_signin_description&quot;:&quot;Use your existing Selar account or sign in via email, Google, Facebook, or Twitter.&quot;,&quot;tickets_physical_events_group_check_heading&quot;:&quot;GROUP CHECK-IN &quot;,&quot;tickets_physical_events_group_check_description&quot;:&quot;Scan to check in group tickets all at once or individually.&quot;,&quot;tickets_physical_events_guest_heading&quot;:&quot;GUEST LIST &amp; ATTENDEE MANAGEMENT&quot;,&quot;tickets_physical_events_guest_description&quot;:&quot;Instantly view and manage your guest list directly on the app.&quot;,&quot;tickets_physical_events_offline_heading&quot;:&quot;WORK OFFLINE&quot;,&quot;tickets_physical_events_offline_description&quot;:&quot;Continue to check in guests even without internet connectivity; data automatically syncs when you\u2019re back online.&quot;,&quot;tickets_physical_events_multidevice_heading&quot;:&quot;MULTI-DEVICE CHECK-IN&quot;,&quot;tickets_physical_events_multidevice_description&quot;:&quot;Allow multiple team members to check in guests using a unique event code.&quot;,&quot;tickets_app_get_it_on&quot;:&quot;GET IT ON&quot;,&quot;tickets_app_download_on_the&quot;:&quot;Download on the&quot;,&quot;tickets_cta_heading&quot;:&quot;Sell Tickets &amp; Check In Guests at Physical Events&quot;,&quot;tickets_cta_description&quot;:&quot;Use the\u00a0Tickets by Selar\u00a0app\u2014built specifically for seamless check-ins at physical events. &lt;br\/&gt; Scan tickets, track attendance, and manage guest lists\u2014all from your phone.&quot;,&quot;tickets_faqs_question_event_types&quot;:&quot;What types of events and masterclasses can I use your platform for?\u00a0&quot;,&quot;tickets_faqs_answer_event_types&quot;:&quot; Our platform supports a wide range of events, including online, physical, and hybrid events.&quot;,&quot;tickets_faqs_question_event_ticket_types&quot;:&quot;What type of event tickets can I sell?&quot;,&quot;tickets_faqs_answer_event_ticket_types&quot;:&quot;You can sell tickets for various events such as webinars, conferences, raves, festivals, movie premieres, concerts, trade shows, seminars, and workshops. Our system is designed to support a variety of event types to meet your specific needs.&quot;,&quot;tickets_faqs_question_setup_event&quot;:&quot;How do I set up an event on your platform?&quot;,&quot;tickets_faqs_answer_setup_event&quot;:&quot;Setting up an event is easy. Just log in to your account, select \u2018Add Product,\u2019 choose \u2018Ticket &amp; Masterclass\u2019 fill in the required details, and publish your event.&quot;,&quot;tickets_faqs_question_ticket_fees&quot;:&quot;How much are your fees for selling tickets?&quot;,&quot;tickets_faqs_answer_ticket_fees&quot;:&quot;Please check our pricing page for transaction fees.&quot;,&quot;tickets_faqs_question_support_multicurrency&quot;:&quot;Do you support multi-currency payments?&quot;,&quot;tickets_faqs_answer_support_multicurrency&quot;:&quot;Yes! Selar supports twelve currencies (USD, GBP, NGN, KES, GHS, TZS, UGX, XOF, XAF, ZMW, RWF &amp; ZAR) by default, so you can sell globally without extra setup. Simply set your product price in your local currency, and buyers can switch to another currency\u2014Selar automatically converts the amount at the most favorable rates.&quot;,&quot;tickets_faqs_question_track_sales&quot;:&quot;How can I track ticket sales and attendee data?&quot;,&quot;tickets_faqs_answer_track_sales&quot;:&quot;You can easily track ticket sales, revenue, and attendee data through your user dashboard.&quot;,&quot;tickets_faqs_question_use_product&quot;:&quot;Who can use Tickets &amp; Masterclasses by Selar?&quot;,&quot;tickets_faqs_answer_use_product&quot;:&quot;Event organizers and educators who sell tickets or host masterclasses on Selar can use this platform an ent&quot;,&quot;turbo_plan_uploads_benefit&quot;:&quot;Upload up to 25 courses (Unlimited videos)&quot;,&quot;turboplus_plan_banner_text&quot;:&quot;FOR POWER CREATORS&quot;,&quot;turboplus_plan_name&quot;:&quot;TURBOPLUS&quot;,&quot;turboplus_plan_description&quot;:&quot;For power creators that have a lot of courses and memberships to sell, now you can do so much more!&quot;,&quot;turboplus_plan_action_button_text&quot;:&quot;Get Started&quot;,&quot;turboplus_plan_uploads_benefit&quot;:&quot;Upload up to 60 courses (Unlimited videos)&quot;,&quot;turboplus_plan_replays_benefit&quot;:&quot;Sell 60 single videos\/webinar replays (Stream online only)&quot;,&quot;turboplus_plan_turbo_plan_inclusion_benefit&quot;:&quot;Everything in Turbo Plan&quot;,&quot;turboplus_plan_membership_courses_benefit&quot;:&quot;Sell 10 Membership (Subscription) courses (Unlimited videos)&quot;,&quot;turboplus_plan_withdrawals_benefit&quot;:&quot;Free wallet withdrawals (for NGN only, more currencies soon)&quot;,&quot;enterprise_plan_name&quot;:&quot;ENTERPRISE&quot;,&quot;enterprise_plan_high_growth_creators&quot;:&quot;For high-growth creators and organizations with advanced needs. &lt;b&gt;Request a custom solution &lt;\/b&gt; built to scale with your business goals.&quot;,&quot;enterprise_plan_unique_needs&quot;:&quot;FOR POWER CREATORS WITH UNIQUE NEEDS&quot;,&quot;enterprise_plan_custom_fee&quot;:&quot;Custom&quot;,&quot;enterprise_plan_contact_sales&quot;:&quot;Contact Sales&quot;,&quot;enterprise_plan_different_business&quot;:&quot;Your business is different. Let\u2019s build a plan that matches.&quot;,&quot;enterprise_plan_includes_everything&quot;:&quot;Includes everything in the TurboPlus Plan and additional enterprise features&quot;,&quot;enterprise_plan_bigger_goals&quot;:&quot;Bigger goals?&quot;,&quot;enterprise_plan_build_plan&quot;:&quot;Let\u2019s build a &lt;br\/&gt; custom plan&quot;,&quot;enterprise_plan_tailor_selar&quot;:&quot;Let\u2019s tailor Selar to your business needs.&quot;,&quot;enterprise_plan_work_for_you&quot;:&quot;We\u2019ll make it work for you.&quot;,&quot;enterprise_plan_get_in_touch&quot;:&quot;Get In Touch&quot;,&quot;enterprise_plan_company_name&quot;:&quot;Company Name&quot;,&quot;enterprise_plan_company_website&quot;:&quot;Company Website&quot;,&quot;enterprise_plan_contact_person&quot;:&quot;Contact Person&quot;,&quot;enterprise_plan_contact_email&quot;:&quot;Contact Email&quot;,&quot;enterprise_plan_contact_phone&quot;:&quot;Contact Phone Number&quot;,&quot;enterprise_plan_brief_explanation&quot;:&quot;Brief explanation of what you&#039;d like to achieve&quot;,&quot;enterprise_plan_type_message&quot;:&quot;Type in message...&quot;,&quot;enterprise_plan_submit&quot;:&quot;Submit&quot;,&quot;enterprise_plan_thank_you&quot;:&quot;Thank You!&quot;,&quot;enterprise_plan_review_this&quot;:&quot;We&#039;d review this and give you a call in less than 24 hours&quot;,&quot;enterprise_plan_email&quot;:&quot;Email&quot;,&quot;enterprise_plan_phone_number&quot;:&quot;Phone Number&quot;,&quot;pricing_transact_fees_heading&quot;:&quot;About our transaction fees&quot;,&quot;pricing_transact_fees_description&quot;:&quot;Regardless of your plan, you&#039;ll be charged a small transaction fee when you make a successful sale, and this fee varies by the currency of your sale. By default, you can sell in all of the currencies below.&quot;,&quot;pricing_transact_fees_alternate_option&quot;:&quot;You also have the option of passing these transaction fees to your customers to pay and you get paid the full product amount.&quot;,&quot;prcing_int_customer_never_lose&quot;:&quot;Never lose an international customer again!&quot;,&quot;prcing_int_customer_multiple_gateways&quot;:&quot;We&#039;ve integrated multiple payment gateways to ensure you can receive payments from anywhere in the world. We&#039;ve also added support for local payment methods for our &lt;span style=&#039;color:#2449DB;font-weight:700&#039; &gt;14 supported currencies&lt;\/span&gt;, including PayPal and Stripe for verified merchants, so all your international customers can truly pay without any hassle.&quot;,&quot;prcing_int_customer_supported_options&quot;:&quot;Some of our supported payment options&quot;,&quot;transact_fees_standard_rate_card_heading&quot;:&quot;Standard rate&quot;,&quot;transact_fees_standard_rate_card_charge_frequency&quot;:&quot;per sale&quot;,&quot;transact_fees_action_button_text&quot;:&quot;Start Selling with Selar&quot;,&quot;pricing_faqs_heading&quot;:&quot;Frequently Asked Questions&quot;,&quot;pricing_faqs_question_get_paid&quot;:&quot;How do I get paid ?&quot;,&quot;pricing_faqs_answer_get_paid&quot;:&quot;When setting up your Selar account, you set your local bank account\/mobile money details, and that&#039;s where all your payouts will be sent. Local bank account simply means an account in the default currency of your country. E.g, As a Nigerian merchant your local bank account will be your Naira bank account. At this time, we only support automatic payouts for Naira. So if you make a sale in Naira, a day after the transaction we payout the funds straight to your Nigerian bank account automatically. However, for all other currencies and merchants in other countries, when you make a sale, we payout the funds to your Selar wallet, and you can withdraw it at any time to your local bank account\/mobile money.&quot;,&quot;pricing_faqs_question_withdrawal&quot;:&quot;When funds are in your wallet, withdrawal fees?&quot;,&quot;pricing_faqs_answer_withdrawal&quot;:&quot;There are two settlement options, Automatic &amp; Manual settlements. Automatic settlements are when the profit from sales are paid straight to your bank account, this option is only available to Nigerian merchants selling in Naira at this time, for affiliates and merchants in all other countries, when a sale is made, the funds are paid to your Selar wallet, and once it&#039;s in your Selar wallet, you can withdraw it immediately. &lt;br \/&gt;&lt;br \/&gt; Withdrawal fees for taking funds out of your wallet: &lt;ul class=&#039;pl-1&#039;&gt;&lt;li&gt;&lt;b&gt;Nigerian Naira (NGN)&lt;\/b&gt;: NGN 50&lt;\/li&gt;&lt;li&gt;&lt;b&gt;Ghana Cedi (GHS)&lt;\/b&gt;: GHS 7&lt;\/li&gt;&lt;li&gt;&lt;b&gt;Kenyan Shilling (KES)&lt;\/b&gt;: KES 100 &lt;\/li&gt;&lt;li&gt;&lt;b&gt;Tanzanian Shilling (TZS)&lt;\/b&gt;: TZS 3500&lt;\/li&gt;&lt;li&gt;&lt;b&gt;Ugandan Shilling (UGX)&lt;\/b&gt;: UGX 11,500&lt;\/li&gt;&lt;li&gt;&lt;b&gt;South African Rands (ZAR)&lt;\/b&gt;: ZAR 12&lt;\/li&gt;&lt;li&gt;&lt;b&gt;Central African CFA franc (XAF)&lt;\/b&gt;: 600 XAF&lt;\/li&gt;&lt;li&gt;&lt;b&gt;West African CFA franc (XOF)&lt;\/b&gt;: 600 XOF&lt;\/li&gt;&lt;li&gt;&lt;b&gt;Rwandan Francs (RWF)&lt;\/b&gt;: 600 RWF&lt;\/li&gt;&lt;li&gt;&lt;b&gt;US Dollars (USD)&lt;\/b&gt;: USD  0 - Free (via PayPal)&lt;\/li&gt;&lt;li&gt;&lt;b&gt;British Pounds (GBP)&lt;\/b&gt;:  GBP  0 - Free (via PayPal)&lt;\/li&gt;&lt;li&gt;&lt;b&gt;Zambian Kwacha (ZMW)&lt;\/b&gt;:  ZMW  10&lt;\/li&gt;&lt;\/ul&gt;&quot;,&quot;pricing_faqs_question_bank_transfer&quot;:&quot;How does Bank transfer option on the store work?&quot;,&quot;pricing_faqs_answer_bank_transfer_system_initial_text&quot;:&quot;When paying in Naira, there&#039;s an option to pay via bank transfer. This is an automated system by our payment provider. For each transaction, a unique bank transfer is presented to the customer, with the &lt;br\/&gt;  &lt;p&gt; &lt;b&gt;If a customer transfers an incorrect amount from the amount on checkout&lt;\/b&gt;: the system rejects the funds and reverses the funds to the customer in 24 hours. If the reversal is not done automatically in 24 hours, reach out to &lt;a href=&#039;mailto:hello@selar.com&#039;&gt;hello@selar.com&lt;\/a&gt;.&lt;\/p&gt; &lt;br\/&gt; &lt;p&gt; &lt;b&gt;If a customer transfers an amount higher than the amount on checkout&lt;\/b&gt;: the systm accepts the transaction and reverses the excess funds back to the customer. &lt;\/p&gt; &lt;p&gt; &lt;b&gt;Here&#039;s a guide on how to pay via bank transfer that you can share with your customer&lt;\/b&gt;: &lt;a class=&#039;text-blue-500 underline&#039; href=&#039;https:\/\/selar.com\/banktransfer&#039;&gt;IMAGE GUIDE&lt;\/a&gt; &lt;\/p&gt;&quot;,&quot;pricing_faqs_answer_bank_transfer_system_bold_text&quot;:&quot;account name SELAR .&quot;,&quot;pricing_faqs_answer_bank_transfer_system_final_text&quot;:&quot;The bank account number is generated on the fly, and when a customer transfers to that account number, the system automatically verifies the amount, and approves the transaction.&quot;,&quot;pricing_faqs_answer_bank_transfer_incorrect_amount&quot;:&quot;If a customer transfers an incorrect amount from the amount on checkout:&quot;,&quot;pricing_faqs_answer_bank_transfer_incorrect_amount_reversal&quot;:&quot;the system rejects the funds and reverses the funds to the customer in 24 hours. If the reversal is not done automatically in 24 hours, reach out to hello@selar.com.&quot;,&quot;pricing_faqs_answer_bank_transfer_excess_amount&quot;:&quot;If a customer transfers an amount higher than the amount on checkout&quot;,&quot;pricing_faqs_answer_bank_transfer_excess_amount_reversal&quot;:&quot;the system accepts the transaction and reverses the excess funds back to the customer.&quot;,&quot;pricing_faqs_answer_bank_transfer_guide&quot;:&quot;Here&#039;s a guide on how to pay via bank transfer that you can share with your customer:&quot;,&quot;pricing_faqs_answer_bank_transfer_guide_link&quot;:&quot;IMAGE GUIDE&quot;,&quot;pricing_faqs_question_payout&quot;:&quot;Minimum Payout \/ Withdrawal amount?&quot;,&quot;pricing_faqs_answer_payout&quot;:&quot;For payouts\/Withdrawals, here&#039;s the minimum amount to take funds out of your wallet. &lt;br \/&gt;&lt;br \/&gt; &lt;ul class=&#039;pl-1&#039;&gt; &lt;li&gt;&lt;b&gt;Nigerian Naira (NGN)&lt;\/b&gt;: NGN 100&lt;\/li&gt;&lt;li&gt;&lt;b&gt;Ghana Cedi (GHS)&lt;\/b&gt;: GHS 100&lt;\/li&gt;&lt;li&gt;&lt;b&gt;Kenyan Shilling (KES)&lt;\/b&gt;: KES 100 &lt;\/li&gt;&lt;li&gt;&lt;b&gt;Tanzanian Shilling (TZS)&lt;\/b&gt;: TZS 100&lt;\/li&gt;&lt;li&gt;&lt;b&gt;Ugandan Shilling (UGX)&lt;\/b&gt;: UGX 1,000&lt;\/li&gt;&lt;li&gt;&lt;b&gt;South African Rands (ZAR)&lt;\/b&gt;: ZAR 10&lt;\/li&gt;&lt;li&gt;&lt;b&gt;Central African CFA franc (XAF)&lt;\/b&gt;: 100 XAF&lt;\/li&gt;&lt;li&gt;&lt;b&gt;West African CFA franc (XOF)&lt;\/b&gt;: 100 XOF&lt;\/li&gt;&lt;li&gt;&lt;b&gt;Rwandan Francs (RWF)&lt;\/b&gt;: 100 RWF&lt;\/li&gt;&lt;li&gt;&lt;b&gt;US Dollars (USD)&lt;\/b&gt;: USD  5&lt;\/li&gt;&lt;li&gt;&lt;b&gt;British Pounds (GBP)&lt;\/b&gt;:  GBP  5&lt;\/li&gt;&lt;li&gt;&lt;b&gt;Zambian Kwacha (ZMW)&lt;\/b&gt;:  ZMW  2&lt;\/li&gt;&lt;\/ul&gt;&quot;,&quot;pricing_faqs_answer_minimum_payout_naira&quot;:&quot;Nigerian Naira (NGN): NGN 100&quot;,&quot;pricing_faqs_answer_minimum_payout_cedi&quot;:&quot;Ghana Cedi (GHS): GHS 100&quot;,&quot;pricing_faqs_answer_minimum_payout_kenyan_shilling&quot;:&quot;Kenyan Shilling (KES): KES 100&quot;,&quot;pricing_faqs_answer_minimum_payout_tanzanian_shilling&quot;:&quot;Tanzanian Shilling (TZS): TZS 100&quot;,&quot;pricing_faqs_answer_minimum_payout_ugandan_shilling&quot;:&quot;Ugandan Shilling (UGX): UGX 1,000&quot;,&quot;pricing_faqs_answer_minimum_payout_rands&quot;:&quot;South African Rands (ZAR): ZAR 10&quot;,&quot;pricing_faqs_answer_minimum_payout_Central_African_CFA _franc&quot;:&quot;Central African CFA franc (XAF): 100 XAF&quot;,&quot;pricing_faqs_answer_minimum_payout_West_African_CFA_franc&quot;:&quot;West African CFA franc (XOF): 100 XOF&quot;,&quot;pricing_faqs_answer_minimum_payout_Rwandan_Francs&quot;:&quot;Rwandan Francs (RWF): 100 RWF&quot;,&quot;pricing_faqs_answer_minimum_payout_US_Dollars&quot;:&quot;US Dollars (USD): USD 5&quot;,&quot;pricing_faqs_answer_minimum_payout_British_Pounds&quot;:&quot;British Pounds (GBP): GBP 5&quot;,&quot;pricing_faqs_question_bank_transfer_receipt&quot;:&quot;Bank transfer payments - I paid but I&#039;ve not gotten the receipt?&quot;,&quot;pricing_faqs_answer_bank_transfer_receipt&quot;:&quot;When paying in Naira, there&#039;s an option for the customer to pay via bank transfer. This is an automated system by our payment provider, and unlike you receiving bank transfer payments and verifying it manually, when your customer pays via bank transfer on Selar, the system automatically verifies it and approves the transaction, which automatically gives the customer access to your product. For each transaction, a unique bank transfer is presented to the customer, with the account name SELAR . The bank account number is generated on the fly, and when a customer transfers to that account number, the system automatically verifies the amount, and approves the transaction.&quot;,&quot;pricing_faqs_answer_bank_transfer_receipt_delays&quot;:&quot;Due to delays with bank transfer sometimes in Nigeria, transfers don&#039;t reflect immediately, hence the automated system is unable to verify the transaction, in those cases, kindly wait about 45 minutes to 1 hour, and when the transfer eventually hits, you&#039;ll get an email receipt with the details of your purchase. If you don&#039;t get your receipt in 2-3 hours, please reach out to hello@selar.com for help.&quot;,&quot;pricing_faqs_question_receive_payments&quot;:&quot;How do I receive payments in other currencies like USD&quot;,&quot;pricing_faqs_answer_receive_payments_initial_text&quot;:&quot;You can receive payments in twelve currencies&quot;,&quot;pricing_faqs_answer_receive_payments_currencies&quot;:&quot;(USD, GBP, NGN, KES, GHS, TZS, UGX, XOF, XAF, ZMW, RWF &amp; ZAR)&quot;,&quot;pricing_faqs_answer_receive_payments_final_text&quot;:&quot;using Selar and what&#039;s great is, it&#039;s enabled for you by default and you don&#039;t have to do anything extra. All you have to do is set the price of your product in your local currency, and on your store page the buyers can switch to another currency, and we&#039;d automatically convert the amount with the most favorable rates.&quot;,&quot;pricing_faqs_question_payment_options&quot;:&quot;What payment options can my customers pay with ?&quot;,&quot;pricing_faqs_answer_payment_options&quot;:&quot;Our goal at Selar is to provide creators and entreprenuers with a single platform for all their payment needs. To achieve this, we support multiple payment options like: debit, credit and Amex cards, USSD, M-Pesa, Ghana mobile money, bank account transfers, and many more. We&#039;re also consistently working hard to support more currencies.&quot;,&quot;pricing_faqs_question_handle_payouts&quot;:&quot;How do you handle payouts of other currencies, e.g USD ?&quot;,&quot;pricing_faqs_answer_handle_payouts&quot;:&quot;For any sale you make in a currency that is not your local currency, we convert the funds to your local currency and credit your Selar wallet, then you can withdraw the funds to your local bank account\/mobile money at any time. E.g When a Ghanaian merchants receives USD, we convert the USD received to GHS on the payout date, and credit the merchant&#039;s wallet. Then the merchant can withdraw the funds straight to their Ghanaian bank account or mobile money. For currency conversions, we work hard to stick to very competitive rates.&quot;,&quot;faqs_hero_heading&quot;:&quot;Frequently Asked Questions&quot;,&quot;faqs_hero_looking_for_answers_question&quot;:&quot;Looking for answers about Selar?&quot;,&quot;faqs_hero_helpdesk_info_part_1&quot;:&quot;Our comprehensive helpdesk has all the information you need. If you still have questions,&quot;,&quot;faqs_hero_helpdesk_info_part_2&quot;:&quot;helpdesk&quot;,&quot;faqs_hero_helpdesk_info_part_3&quot;:&quot;has all the information you need. If you still have questions,&quot;,&quot;faqs_nav_merchants_tab_text&quot;:&quot;For Merchants&quot;,&quot;faqs_nav_affiliates_tab_text&quot;:&quot;For Affiliates&quot;,&quot;faqs_nav_customers_tab_text&quot;:&quot;For Customers&quot;,&quot;faqs_merchants_question_&quot;:&quot;How does Bank transfer option on the store work?&quot;,&quot;faqs_merchants_answer_&quot;:&quot;For payouts\/Withdrawals, here&#039;s the minimum amount to take funds out of your wallet.&quot;,&quot;faqs_merchants_answer_bank_transfer&quot;:&quot;When paying in Naira, there&#039;s an option to pay via bank transfer. This is an automated system by our payment provider. For each transaction, a unique bank transfer is presented to the customer, with the account name SELAR . The bank account number is generated on the fly, and when a customer transfers to that account number, the system automatically verifies the amount, and approves the transaction.&quot;,&quot;faqs_merchants_question_transfer_receipt&quot;:&quot;Bank transfer payments - I paid but I&#039;ve not gotten the receipt?&quot;,&quot;faqs_merchants_answer_transfer_receipt&quot;:&quot;When paying in Naira, there&#039;s an option for the customer to pay via bank transfer. This is an automated system by our payment provider, and unlike you receiving bank transfer payments and verifying it manually, when your customer pays via bank transfer on Selar, the system automatically verifies it and approves the transaction, which automatically gives the customer access to your product. For each transaction, a unique bank transfer is presented to the customer, with the account name SELAR . The bank account number is generated on the fly, and when a customer transfers to that account number, the system automatically verifies the amount, and approves the transaction. Due to delays with bank transfer sometimes in Nigeria, transfers don&#039;t reflect immediately, hence the automated system is unable to verify the transaction, in those cases, kindly wait about 45 minutes to 1 hour, and when the transfer eventually hits, you&#039;ll get an email receipt with the details of your purchase. If you don&#039;t get your receipt in 2-3 hours, please reach out to hello@selar.com for help.&quot;,&quot;faqs_merchants_question_receive_payments&quot;:&quot;How do I receive payments in other currencies like USD ?&quot;,&quot;faqs_merchants_answer_receive_payments&quot;:&quot;You can receive payments in twelve currencies (USD, GBP, NGN, KES, GHS, TZS, UGX, XOF, XAF, ZMW, RWF &amp; ZAR) using Selar and what&#039;s great is, it&#039;s enabled for you by default and you don&#039;t have to do anything extra. All you have to do is set the price of your product in your local currency, and on your store page the buyers can switch to another currency, and we&#039;d automatically convert the amount with the most favorable rates.&quot;,&quot;faqs_merchants_question_payment_options&quot;:&quot;What payment options can my customers pay with ?&quot;,&quot;faqs_merchants_answer_payment_options&quot;:&quot;Our goal at Selar is to provide creators and entrepreneurs with a single platform for all their payment needs. To achieve this, we support multiple payment options like: debit, credit and Amex cards, USSD, M-Pesa, PayPal &amp; Stripe (for verified merchants), Ghana mobile money, bank account transfers, and many more. We&#039;re also consistently working hard to support more currencies.&quot;,&quot;faqs_merchants_question_handle_payouts&quot;:&quot;How do you handle payouts of other currencies, e.g USD ?&quot;,&quot;faqs_affiliates_answer_handle&quot;:&quot;For any sale you make in a currency that is not your local currency, we convert the funds to your local currency and credit your Selar wallet, then you can withdraw the funds to your local bank account\/mobile money at any time. E.g When a Ghanaian merchants receives USD, we convert the USD received to GHS on the payout date, and credit the merchant&#039;s wallet. Then the merchant can withdraw the funds straight to their Ghanaian bank account or mobile money. For currency conversions, we work hard to stick to very competitive rates.&quot;,&quot;faqs_merchants_question_lead_generation_support&quot;:&quot;Does your platform support lead generation ?&quot;,&quot;faqs_merchants_answer_lead_generation_support&quot;:&quot;Selar makes lead generation so easy. When a user tries to buy a product on Selar, they&#039;ll need to add their email address, and this email address is available to you on the dashboard right away. Selar automatically sends an email to the buyer after one (1) hour if they didn&#039;t go through with their purchase saying &#039;hey, you were trying to buy x what happened, here&#039;s a link to complete the purchase &#039;. You can also send your own personal follow ups too.&quot;,&quot;faqs_merchants_question_handle_delivery&quot;:&quot;Does Selar handle the delivery ?&quot;,&quot;faqs_merchants_answer_handle_delivery&quot;:&quot;Selar is a platform that enables businesses to create online stores to sell their products. At this time, we do not offer delivery services for products sold via Selar, merchants will be responsible for delivering the products they sell on Selar. What we&#039;ve done is provide the delivery settings option so merchants can set custom prices for different locations so their customers can pay the delivery fee along with their purchase.&quot;,&quot;faqs_merchants_question_coupons&quot;:&quot;How do I set up coupons ?&quot;,&quot;faqs_merchants_answer_coupons&quot;:&quot;Coupons are a great way to offer discounts to your customers from time to time. From the dashboard, you can click the coupons menu to create coupon codes at whatever discount rate you want. Here&#039;s a link to our blog post on how to create coupons.&quot;,&quot;faqs_merchants_question_payment_platform&quot;:&quot;How reliable and secure is the payment platform ?&quot;,&quot;faqs_merchants_answer_payment_platform&quot;:&quot;One of the many things we take very seriously is Security. Security of our merchants, and their customers in turn. We&#039;ve taken a lot of measures to ensure that our platform is secure, and we&#039;ve only set up PCI compliant payment solutions (the industry standard for payments) on Selar to ensure the details of all our users are extremely safe.&quot;,&quot;faqs_merchants_question_selar_fee&quot;:&quot;What&#039;s the fee for using Selar ?&quot;,&quot;faqs_merchants_answer_selar_fee&quot;:&quot;Selar is completely free to use, you can create a store to host your products online, we only charge when you make a sale via Selar. You can see the price for each currency on our pricing page.&quot;,&quot;faqs_merchants_question_share_product_link&quot;:&quot;How do I share my product link on social media ?&quot;,&quot;faqs_merchants_answer_share_product_link&quot;:&quot;It&#039;s very simple. On the edit page of your product, you&#039;ll see the link at the top of the page, simply copy that link and share it on social media.&quot;,&quot;faqs_merchants_question_get_product_link&quot;:&quot;How do I get my product or store link ?&quot;,&quot;faqs_merchants_answer_get_product_link&quot;:&quot;It&#039;s very simple. Your general store link which is a link to all your products is on your Selar dashboard menu (top right when you open the menu). While you can see the direct link of your product on the edit product page.&quot;,&quot;faqs_merchants_question_product_marketing&quot;:&quot;Does Selar Market products on behalf of sellers ?&quot;,&quot;faqs_merchants_answer_product_marketing&quot;:&quot;We promote products on our social media platforms from time to time, simply follow us on any social media platform and tag us to your post about your product posted on Selar and we&#039;ll be happy to repost it! Keep creating!&quot;,&quot;faqs_merchants_question_currencies&quot;:&quot;What currencies can I sell in ?&quot;,&quot;faqs_merchants_answer_currencies&quot;:&quot;By default, Selar offers twelve (12) currencies to all merchants irrespective of their country, by selling on Selar, you&#039;d be able to sell in USD, GBP, NGN, KES, GHS, TGZ, UGX &amp; ZAR, and the funds will be paid to your country&#039;s local bank account. You can read more about how payouts work here.&quot;,&quot;faqs_merchants_question_get_paid&quot;:&quot;When do I get paid ?&quot;,&quot;faqs_merchants_answer_get_paid&quot;:&quot;See pricing page for payout schedule details.&quot;,&quot;faqs_affiliates_question_&quot;:&quot;When do I get paid ?&quot;,&quot;faqs_affiliates_answer_&quot;:&quot;See pricing page for payout schedule details.&quot;,&quot;faqs_customers_question_bank_transfer&quot;:&quot;How does Bank transfer option on the store work?&quot;,&quot;faqs_customers_answer_bank_transfer&quot;:&quot;When paying in Naira, there&#039;s an option to pay via bank transfer. This is an automated system by our payment provider. For each transaction, a unique bank transfer is presented to the customer, with the account name SELAR . The bank account number is generated on the fly, and when a customer transfers to that account number, the system automatically verifies the amount, and approves the transaction.&quot;,&quot;faqs_customers_question_transfer_payments&quot;:&quot;Bank transfer payments - I paid but I&#039;ve not gotten the receipt?&quot;,&quot;faqs_customers_answer_transfer_payments&quot;:&quot;When paying in Naira, there&#039;s an option for the customer to pay via bank transfer. This is an automated system by our payment provider, and unlike you receiving bank transfer payments and verifying it manually, when your customer pays via bank transfer on Selar, the system automatically verifies it and approves the transaction, which automatically gives the customer access to your product. For each transaction, a unique bank transfer is presented to the customer, with the account name SELAR . The bank account number is generated on the fly, and when a customer transfers to that account number, the system automatically verifies the amount, and approves the transaction.&quot;,&quot;faqs_customers_question_sell_product&quot;:&quot;I just bought a product via Selar, can I sell mine too ?&quot;,&quot;faqs_customers_answer_sell_product&quot;:&quot;Ofcourse! Simply sign up and post your products to start selling on Selar. It takes less than 5 minutes.&quot;,&quot;faqs_customers_question_product_delivery&quot;:&quot;I just bought a product on Selar, how do I get it delivered ?&quot;,&quot;faqs_customers_answer_product_delivery&quot;:&quot;Selar is a platform that enables businesses to create online stores to sell their products. At this time, Selar does not offer delivery services, you&#039;ll need to reach out to the merchant (if you&#039;re not contacted already) for next steps on getting the product delivered to you. If for any reason you&#039;re unable to reach the merchant, please feel free to reach out to us at hello@selar.com and we&#039;ll be happy to help you resolve the issue.&quot;,&quot;faqs_customers_question_download_products&quot;:&quot;How do I download products I paid for ?&quot;,&quot;faqs_customers_answer_download_products&quot;:&quot;To download products you paid for simply click the link to download on your receipt page, and if you don&#039;t have access to your receipt page, simply go to the email inbox and search for the Selar receipt, it contains a link to download the receipt. Be sure to check your spam if you can&#039;t find the Selar receipt. We also recommend you sign up to Selar when making purchases, that way all your purchases will be on your account and you can always access them whenever you want.&quot;,&quot;faqs_customers_question_payment_platform_reliability&quot;:&quot;How reliable and secure is the payment platform ?&quot;,&quot;faqs_customers_answer_payment_platforn_reliability&quot;:&quot;If there&#039;s one thing we take very seriously, it&#039;s security. Security of our merchants, and their customers in turn. We&#039;ve taken a lot of measures to ensure that our platform is secure, and we&#039;ve only set up PCI compliant payment solutions (the industry standard for payments) on Selar to ensure the details of all our users are extremely safe.&quot;,&quot;landing_masterclass_tag_text&quot;:&quot;Masterclasses&quot;,&quot;landing_masterclass_heading&quot;:&quot;Host And Sell Your Masterclass Seamlessly&quot;,&quot;landing_masterclass_benefit_reach_audience&quot;:&quot;Reach your audience&quot;,&quot;landing_masterclass_benefit_deliver_value&quot;:&quot;Deliver value&quot;,&quot;landing_masterclass_benefit_track_attendance&quot;:&quot;Track attendance&quot;,&quot;landing_masterclass_benefit_all_in_one&quot;:&quot;All in one place&quot;,&quot;landing_masterclass_start_hosting&quot;:&quot;Start Hosting Your Masterclasses&quot;,&quot;landing_masterclass_run_like_pro&quot;:&quot;Run Your Masterclass Like a Pro&quot;,&quot;landing_masterclass_help_you_deliver&quot;:&quot;Whether you\u2019re an expert, coach, or educator, hosting a masterclass should be easy and impactful. Selar helps you deliver value, grow your audience, and streamline the entire journey from registration to check In.&quot;,&quot;landing_masterclass_one_platform&quot;:&quot;One Platform.  Zero Tech Skills. Total Control&quot;,&quot;landing_masterclass_multiple_tools&quot;:&quot;You don\u2019t need multiple tools or tech skills. With Selar, you can manage access and replays, send meeting links automatically, track attendance, and onboard students in minutes\u2014all from one powerful platform.&quot;,&quot;landing_masterclass_everything_you_need&quot;:&quot;Everything You Need to Launch, Sell &amp; Scale&quot;,&quot;landing_masterclass_instant_access&quot;:&quot;Instant Access for Attendees&quot;,&quot;landing_masterclass_immediate_access_for_attendees&quot;:&quot;Attendees get immediate access once they register. No delays, no friction.&quot;,&quot;landing_masterclass_free_and_paid_sessions&quot;:&quot;Free &amp; Paid Sessions&quot;,&quot;landing_masterclass_fully_control_earnings&quot;:&quot;Offer free sessions or set premium prices\u2014you&#039;re in full control of your earnings.&quot;,&quot;landing_masterclass_calendar_and_links&quot;:&quot;Calendar &amp; Meeting links&quot;,&quot;landing_masterclass_auto_send_invites&quot;:&quot;Automatically send calendar invites with session links to keep your event organized.&quot;,&quot;landing_masterclass_add_whatsapp_links&quot;:&quot;Add WhatsApp Links&quot;,&quot;landing_masterclass_share_whatsapp&quot;:&quot;Share a WhatsApp link for quick, direct communication before or after the session.&quot;,&quot;landing_masterclass_telegram_integration&quot;:&quot;Telegram Integration&quot;,&quot;landing_masterclass_enage_audience&quot;:&quot;Engage your audience through Telegram to build deeper community.&quot;,&quot;landing_masterclass_host_anywhere&quot;:&quot;Host Masterclasses Anywhere&quot;,&quot;landing_masterclass_host_locations&quot;:&quot;Whether online, in person, or hybrid, teach your masterclass your way, with tools that support you every step of the way.&quot;,&quot;landing_masterclass_auto_reminders&quot;:&quot;Automated Reminders&quot;,&quot;landing_masterclass_set_auto_reminders&quot;:&quot;Send auto-reminders to boost show-up rates and keep your audience engaged.&quot;,&quot;landing_masterclass_sell_replay_videos&quot;:&quot;Sell Replay Videos&quot;,&quot;landing_masterclass_monetize_sessions&quot;:&quot;Monetize your sessions even after they end by offering replays\u2014reach more people and boost your earnings.&quot;,&quot;landing_masterclass_multiple_currencies&quot;:&quot;Multiple Currencies&quot;,&quot;landing_masterclass_global_reach&quot;:&quot;Reach a global audience and accept payments in the currency that works for them.&quot;,&quot;landing_masterclass_use_mobile_app&quot;:&quot;With the Mobile App&quot;,&quot;landing_masterclass_mobile_app_seamless_checkin&quot;:&quot;Seamlessly check in attendees and stay in control\u2014on-site, online, or anywhere in between.&quot;,&quot;landing_masterclass_download_app&quot;:&quot;Download App&quot;,&quot;landing_masterclass_customer_testimony&quot;:&quot; \u2014 welcomed over 2,000 attendees in Lagos\u2014many of whom booked their sessions using &quot;,&quot;landing_masterclass_customer_testimony_mobile&quot;:&quot; \u2014 &lt;br\/&gt; welcomed over 2,000 attendees in &lt;br\/&gt; Lagos\u2014many of whom booked their &lt;br\/&gt; sessions using &quot;,&quot;landing_masterclass_customer_testimony_2&quot;:&quot;\u201cManaging ticket purchases was a huge part of the conference\u2019s success, and Selar was the best platform for it,\u201d&quot;,&quot;landing_masterclass_program_director&quot;:&quot; Program Director&quot;,&quot;landing_masterclass_deliver_impact&quot;:&quot;Whether it&#039;s a virtual training, an in-person workshop, or a live group coaching session, Selar lets you focus on what matters most: delivering impact.&quot;,&quot;landing_masterclass_cta_ready_to_launch&quot;:&quot;Ready to Launch Your Next Masterclass?&quot;,&quot;landing_masterclass_run_any_session&quot;:&quot;Run any session\u2014virtual, in-person, or hybrid\u2014without the tech stress.&quot;,&quot;landing_masterclass_cta_start_hosting&quot;:&quot;Start Hosting Your Masterclass&quot;,&quot;landing_masterclass_faqs_heading&quot;:&quot;Frequently Asked Questions&quot;,&quot;landing_masterclass_faq_question_type_of_masterclass&quot;:&quot;What types of masterclasses can I host on Selar?&quot;,&quot;landing_masterclass_faq_answer_types_masterclass&quot;:&quot;You can host coaching sessions, training programs, webinars, workshops as, and more\u2014whether online, offline, or hybrid.&quot;,&quot;landing_masterclass_faq_question_can_i_charge&quot;:&quot;Can I charge for my masterclass?&quot;,&quot;landing_masterclass_faq_answer_can_i_charge&quot;:&quot;Yes! You can offer free or paid access, set custom pricing tiers, and accept payments in multiple currencies.&quot;,&quot;landing_masterclass_faq_question_access_masterclass&quot;:&quot;How do attendees access my masterclass?&quot;,&quot;landing_masterclass_faq_answer_access_masterclass&quot;:&quot;After purchase, attendees instantly receive access along with your meeting link, event details, and an option to add it to their calendar. You also have the option to hide event details until after purchase, which is perfect for exclusive or paid sessions.&quot;,&quot;landing_masterclass_faq_question_track_attendees&quot;:&quot;Can I track attendance for my masterclass?&quot;,&quot;landing_masterclass_faq_answer_track_attendees&quot;:&quot;Yes. Selar allows you to monitor check-ins, see who attended, and track revenue\u2014all in real-time.&quot;,&quot;landing_masterclass_faq_question_manage_group_masterclass&quot;:&quot;Can I manage a group masterclass booking?&quot;,&quot;landing_masterclass_faq_answer_manage_group_masterclass&quot;:&quot;Absolutely. Attendees can purchase for a group and send access to multiple participants with a single checkout.&quot;,&quot;landing_masterclass_faq_question_attendee_limit&quot;:&quot;Is there a limit to how many people I can host?&quot;,&quot;landing_masterclass_faq_answer_attendee_limit&quot;:&quot;No. Selar supports everything from 1-on-1 sessions to large classes with thousands of participants.&quot;,&quot;landing_masterclass__faq_question_get_started&quot;:&quot;How do I get started?&quot;,&quot;landing_masterclass_faq_answer_get_started&quot;:&quot;Simply log into Selar, click \u201cAdd Product,\u201d and choose \u201cTicket &amp; Masterclass.\u201d Fill in your details and hit publish. You\u2019re live in minutes.\u00a0\nWatch the demo - &lt;a style=&#039;color:#205fe5;text-decoration:underline;&#039; href=&#039;https:\/\/youtu.be\/xtEzsW8XufM?si=VriNepcNiKPpB6lI&#039;&gt;https:\/\/youtu.be\/xtEzsW8XufM?si=VriNepcNiKPpB6lI&lt;\/a&gt;&quot;,&quot;landing_bookings_hero_heading&quot;:&quot;Stop Wasting Time on Scheduling. -Let Selar Handle It for You-&quot;,&quot;landing_bookings_hero_description&quot;:&quot;Automate scheduling for meetings, classes, and coaching sessions. &lt;br\/&gt; Save time, eliminate manual errors, and deliver a seamless experience from start to finish.&quot;,&quot;landing_bookings_enable_location&quot;:&quot;Enable Meeting Locations&quot;,&quot;landing_bookings_sync_appointments&quot;:&quot;Sync your appointments to your calendar&quot;,&quot;landing_bookings_new_request&quot;:&quot;New Booking Request&quot;,&quot;landing_bookings_sell_more&quot;:&quot;Sell more sessions, manage bookings seamlessly, and grow your brand effortlessly with \nSelar. &quot;,&quot;landing_bookings_reminder&quot;:&quot;Booking Reminder!!&quot;,&quot;landing_bookings_payment_received&quot;:&quot;Congratulations! Payment Received&quot;,&quot;landing_bookings_all_in_one&quot;:&quot;Your All-in-One Scheduling Solution&quot;,&quot;landing_bookings_no_hassle&quot;:&quot;Managing appointments shouldn\u2019t be a hassle. Bookings by Selar helps you stay in control\u2014schedule meetings, manage appointments, and host classes effortlessly.&lt;br\/&gt; Whether it\u2019s one-on-one consultations, virtual sessions, or in-person workshops, Selar makes booking seamless for you and your clients.&quot;,&quot;landing_bookings_get_started&quot;:&quot;Get Started&quot;,&quot;landing_bookings_for_every_need&quot;:&quot;Bookings for Every Need&quot;,&quot;landing_bookings_adapts_to_fit&quot;:&quot;No matter how you interact with your audience, Bookings by Selar adapts to fit. &quot;,&quot;landing_bookings_one_on_ones&quot;:&quot;One-on-one Appointments&quot;,&quot;landing_bookings_types&quot;:&quot;Coaching calls, consultations, and personal meetings&quot;,&quot;landing_bookings_classes_workshops&quot;:&quot;Group Classes &amp; Workshops&quot;,&quot;landing_bookings_online_courses&quot;:&quot;Perfect for online courses, training, or in-person sessions.&quot;,&quot;landing_bookings_virtual_or_physical&quot;:&quot;Virtual or Physical Meetings&quot;,&quot;landing_bookings_host_where_you_want&quot;:&quot;Host on Zoom, Google Meet, Skype, or at your preferred location.&quot;,&quot;landing_bookings_workshop&quot;:&quot;Workshop&quot;,&quot;landing_bookings_to_cash&quot;:&quot;Turn bookings into cash.&quot;,&quot;landing_bookings_training&quot;:&quot;Training&quot;,&quot;landing_bookings_coaching&quot;:&quot;Coaching&quot;,&quot;landing_bookings_consultation&quot;:&quot;Consultation&quot;,&quot;landing_bookings_classes&quot;:&quot;Classes&quot;,&quot;landing_bookings_therapy_session&quot;:&quot;Therapy Session&quot;,&quot;landing_bookings_art_lesson&quot;:&quot;Art Lesson&quot;,&quot;landing_bookings_strategy_call&quot;:&quot;Strategy Call&quot;,&quot;landing_bookings_one_on_one_meeting&quot;:&quot;1-on-1 Meeting&quot;,&quot;landing_bookings_word_cloud_turn&quot;:&quot;Turn&quot;,&quot;landing_bookings_word_cloud_bookings&quot;:&quot;bookings&quot;,&quot;landing_bookings_word_cloud_into&quot;:&quot;into&quot;,&quot;landing_bookings_word_cloud_cash&quot;:&quot;cash&quot;,&quot;landing_bookings_why_choose_selar&quot;:&quot;Why Choose Selar Bookings?&quot;,&quot;landing_bookings_sync_calendar&quot;:&quot;Sync Calendar &amp; Video Conferencing&quot;,&quot;landing_bookings_sync_from_integrations&quot;:&quot;Sync your Google Calendar, Skype, and Microsoft accounts from the integrations page&quot;,&quot;landing_bookings_choose_location&quot;:&quot;Choose Zoom, Google Meet, Skype, or a physical venue.&quot;,&quot;landing_bookings_setup&quot;:&quot;Set-Up Group Bookings&quot;,&quot;landing_bookings_specify_attendee_number&quot;:&quot;Specify the maximum number of attendees per session. Once full, the slot will close automatically. Ideal for hosting classes&quot;,&quot;landing_bookings_customize_scheduling&quot;:&quot;Customize Scheduling&quot;,&quot;landing_bookings_define_slots&quot;:&quot;Define open time slots, choose individual or group bookings, add buffer times, pricing, intake forms, and location options (Zoom, Google Meet, or physical venue).  &quot;,&quot;landing_bookings_optional_intake&quot;:&quot;Optional Intake Forms&quot;,&quot;landing_bookings_add_questionnaire&quot;:&quot;Add a questionnaire if needed.&quot;,&quot;landing_bookings_h t;,&quot;landing_bookings_faq_question_customer_cancels&quot;:&quot;What happens if a customer cancels?&quot;,&quot;landing_bookings_faq_answer_customer_cancels&quot;:&quot;Both the creator and customer will receive a cancellation email, and the slot will be reopened for new bookings automatically.&quot;,&quot;landing_bookings_faq_question_offer_group_bookings&quot;:&quot;Can I offer group bookings?&quot;,&quot;landing_bookings_faq_answer_offer_group_bookings&quot;:&quot;Yes, you can offer group sessions by setting a maximum number of attendees per time slot. Each person books individually, and the slot remains available until the class is full. This ensures your sessions are not overbooked, while still allowing multiple participants to join.&quot;,&quot;landing_bookings_faq_question_receive_reminders&quot;:&quot;Will customers receive reminders?&quot;,&quot;landing_bookings_faq_answer_receive_reminders&quot;:&quot;Yes! Email reminders will be sent 1 day before and 30 minutes before the appointment, helping customers stay on track.&quot;,&quot;landing_bookings_faq_question_manually_add_clients&quot;:&quot;Can I manually add clients?&quot;,&quot;landing_bookings_faq_answer_manually_add_clients&quot;:&quot;Yes! You can manually add clients from the Manage Clients page and schedule their bookings accordingly&quot;,&quot;landing_bookings_faq_question_customize_forms&quot;:&quot;Can I customize intake forms?&quot;,&quot;landing_bookings_faq_answer_customize_forms&quot;:&quot;Yes! You can add customizable intake forms that customers must complete before confirming their booking, ensuring you gather all necessary information.&quot;,&quot;landing_bookings_faq_question_choose_locations&quot;:&quot;Can I choose different meeting locations?&quot;,&quot;landing_bookings_faq_answer_choose_locations&quot;:&quot;Yes! You can select meeting locations such as Zoom, Google Meet, or a physical venue, depending on your preferences.&quot;,&quot;landing_bookings_faq_question_track_appoin
